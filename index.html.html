// ── Scoring ───────────────────────────────────────────────────────────────────
function holePoints(s,par){
  if(!s||!par)return null;
  var n=Math.min(parseInt(s),8),d=n-par;
  if(n===1)return 10;if(d<=-3)return 6;if(d===-2)return 4;if(d===-1)return 2;
  if(d===0)return 1;if(d===1)return 0;if(d===2)return -1;if(d===3)return -2;if(d===4)return -3;return -4;
}
function ppNLC(r){return[8,7,6,5,4,3,2,1][r-1]||0;}
function ppTeam4(r){return[4,3,2,1][r-1]||0;}

function hasAny(scores,player,holes){
  return holes.some(function(h){return scores[player]&&scores[player][h]&&scores[player][h]!=="";});
}
function nlcTot(scores,pars,player,holes){
  return holes.reduce(function(s,h){var p=holePoints(scores[player]&&scores[player][h],pars[h]);return s+(p!==null&&p!==undefined?p:0);},0);
}
function rankArr(arr){
  var s=[].concat(arr).sort(function(a,b){return b.score-a.score;});
  var r=1;s.forEach(function(x,i){if(i>0&&s[i-1].score!==x.score)r=i+1;x.rank=r;});return s;
}
function rankPlayers(scores,pars,players,holes){
  var arr=players.map(function(p){return{id:p,score:nlcTot(scores,pars,p,holes)};});
  return rankArr(arr);
}

// ── Score colours ─────────────────────────────────────────────────────────────
function sBg(v,par){
  if(!v||!par)return C.card;var d=parseInt(v)-par;
  if(parseInt(v)===1)return"#6b4c00";if(d<=-2)return"#4a3300";if(d===-1)return"#0d3d1a";
  if(d===0)return"#0d1f3a";if(d===1)return"#3a1a08";return"#3a0a0a";
}
function sCol(v,par){
  if(!v||!par)return C.dim;var d=parseInt(v)-par;
  if(parseInt(v)===1)return C.goldlt;if(d<=-2)return C.eagle;if(d===-1)return C.birdie;
  if(d===0)return"#93c5fd";if(d===1)return"#fb923c";return C.red;
}
function scoreBadge(v,par){

  if(n===1)return"HIO";if(d<=-2)return"EAGLE";if(d===-1)return"BIRDIE";return null;
}

function mk18(){return H18.map(function(i){return{num:i,par:4,yards:400,hdcp:0,notes:""};});}
function mkSc(){var s={};PLAYERS.forEach(function(p){s[p]={};H18.forEach(function(h){s[p][h]="";});});return s;}
function mkCTP(){var c={};PLAYERS.forEach(function(p){c[p]={};H18.forEach(function(h){c[p][h]=false;});});return c;}
function mkLD(){var l={};PLAYERS.forEach(function(p){l[p]={};H18.forEach(function(h){l[p][h]=false;});});return l;}

// ── Cumulative leaderboard ────────────────────────────────────────────────────
function calcTotal(state,player){try{
  var pB=BROADMOOR_PARS, pT=THORNAPPLE_PARS, pM=MINES_PARS;

  // 1. Masters NLC (F9 Broadmoor)
  var masNLC=nlcTot(state.mastersScores,pB,player,H_F9);
  var masCTP=(state.mastersCTPList||[]).filter(function(e){return e.player===player;}).length*CTP_PTS;
  var masLD=(state.mastersLDList||[]).filter(function(e){return e.player===player;}).length*LD_PTS;
  var masRank=rankPlayers(state.mastersScores,pB,PLAYERS,H_F9);
  var masR=(masRank.find(function(r){return r.id===player;})||{rank:8}).rank;
  var masPl=hasAny(state.mastersScores,player,H_F9)?ppNLC(masR):0;

  // 2. Ryder Cup - place only + CTP + LD
  // Combined NLC across all 9 holes per pair
  var ryderCTP=(state.ryderCTPList||[]).filter(function(e){return e.player===player;}).length*CTP_PTS;
  var ryderLD=(state.ryderLDList||[]).filter(function(e){return e.player===player;}).length*LD_PTS;
  // Find which pair this player is in
  var ryderPair=null;
  (state.ryderPairs||[]).forEach(function(pr,pi){if(pr[0]===player||pr[1]===player)ryderPair={pr:pr,idx:pi};});
  var ryderPl=0;
  if(ryderPair){
    var tk=["A","B","C","D"][ryderPair.idx];
    // Alt shot H10-12 nlc for pair
    var altNLC=H_ALT.reduce(function(s,h){var pts=holePoints(state.altScores[tk]&&state.altScores[tk][h],pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
    // Best ball H13-15
    var bbNLC=H_BB.reduce(function(s,h){
      var s0=parseInt(state.bbScores[ryderPair.pr[0]]&&state.bbScores[ryderPair.pr[0]][h])||999;
      var s1=parseInt(state.bbScores[ryderPair.pr[1]]&&state.bbScores[ryderPair.pr[1]][h])||999;
      var best=Math.min(s0,s1);if(best===999)return s;
      var pts=holePoints(String(best),pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);
    },0);
    // Twosome scramble H16-18
    var rsNLC=H_SC.reduce(function(s,h){var pts=holePoints(state.ryderScScores[tk]&&state.ryderScScores[tk][h],pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
    var pairTot=altNLC+bbNLC+rsNLC;
    // Rank all 4 pairs
    var pairTots=["A","B","C","D"].map(function(t,ti){
      var pr2=state.ryderPairs[ti]||[PLAYERS[ti*2],PLAYERS[ti*2+1]];
      var a2=H_ALT.reduce(function(s,h){var pts=holePoints(state.altScores[t]&&state.altScores[t][h],pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
      var b2=H_BB.reduce(function(s,h){var s0=parseInt(state.bbScores[pr2[0]]&&state.bbScores[pr2[0]][h])||999;var s1=parseInt(state.bbScores[pr2[1]]&&state.bbScores[pr2[1]][h])||999;var best=Math.min(s0,s1);if(best===999)return s;var pts=holePoints(String(best),pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
      var r2=H_SC.reduce(function(s,h){var pts=holePoints(state.ryderScScores[t]&&state.ryderScScores[t][h],pB[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
      return{id:t,score:a2+b2+r2};
    });
    var ranked=rankArr(pairTots);
    var myRank=(ranked.find(function(r){return r.id===tk;})||{rank:4}).rank;
    var hasRyderScores=H_ALT.some(function(h){return state.altScores[tk]&&state.altScores[tk][h];}) ||
      H_BB.some(function(h){return state.bbScores[ryderPair.pr[0]]&&state.bbScores[ryderPair.pr[0]][h];}) ||
      H_SC.some(function(h){return state.ryderScScores[tk]&&state.ryderScScores[tk][h];});
    if(hasRyderScores)ryderPl=ppTeam4(myRank);
  }

  // 3. Scramble - NLC per hole (shared) + place + CTP + LD
  var scCTP=(state.scCTPList||[]).filter(function(e){return e.player===player;}).length*CTP_PTS;
  var scLD=(state.scLDList||[]).filter(function(e){return e.player===player;}).length*LD_PTS;
  var scFrontNLC=0,scBackNLC=0,scFrontPl=0,scBackPl=0;
  var TK=["A","B","C","D"];
  // Front scramble
  TK.forEach(function(t,ti){
    var pair=(state.scFrontPairs||[])[ti]||[];
    if(pair.indexOf(player)!==-1){
      try{scFrontNLC=H_F9.reduce(function(s,h){var pts=holePoints(state.scFrontScores&&state.scFrontScores[t]&&state.scFrontScores[t][h],pT[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);}catch(e){scFrontNLC=0;}
    }
  });
  // Front place
  var frontTots=TK.map(function(t){return{id:t,score:H_F9.reduce(function(s,h){var pts=holePoints(state.scFrontScores[t]&&state.scFrontScores[t][h],pT[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0)};});
  var frontRanked=rankArr(frontTots);
  TK.forEach(function(t,ti){
    var pair=(state.scFrontPairs||[])[ti]||[];
    if(pair.indexOf(player)!==-1){
      var hasF=H_F9.some(function(h){return state.scFrontScores[t]&&state.scFrontScores[t][h];});
      if(hasF)scFrontPl=ppTeam4((frontRanked.find(function(r){return r.id===t;})||{rank:4}).rank);
    }
  });
  // Back scramble
  TK.forEach(function(t,ti){
    var pair=(state.scBackPairs||[])[ti]||[];
    if(pair.indexOf(player)!==-1){
      scBackNLC=H_B9.reduce(function(s,h){var pts=holePoints(state.scBackScores[t]&&state.scBackScores[t][h],pT[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0);
    }
  });
  var backTots=TK.map(function(t){return{id:t,score:H_B9.reduce(function(s,h){var pts=holePoints(state.scBackScores[t]&&state.scBackScores[t][h],pT[h]);return s+(pts!==null&&pts!==undefined?pts:0);},0)};});
  var backRanked=rankArr(backTots);
  TK.forEach(function(t,ti){
    var pair=(state.scBackPairs||[])[ti]||[];
    if(pair.indexOf(player)!==-1){
      var hasB=H_B9.some(function(h){return state.scBackScores[t]&&state.scBackScores[t][h];});
      if(hasB)scBackPl=ppTeam4((backRanked.find(function(r){return r.id===t;})||{rank:4}).rank);
    }
  });

  // 4. 4v4 - place + CTP + LD + bogey-free bonus
  var fv4CTP=(state.fv4CTPList||[]).filter(function(e){return e.player===player;}).length*CTP_PTS;
  var fv4LD=(state.fv4LDList||[]).filter(function(e){return e.player===player;}).length*LD_PTS;
  var fv4Pl=0;
  var dt=state.draftTeams||{A:[],B:[]};
  var myTeam=dt.A.indexOf(player)!==-1?"A":dt.B.indexOf(player)!==-1?"B":null;
  if(myTeam){
    var rawA=H18.reduce(function(s,h){return s+(parseInt(state.fv4Scores&&state.fv4Scores.A&&state.fv4Scores.A[h])||0);},0);
    var rawB=H18.reduce(function(s,h){return s+(parseInt(state.fv4Scores&&state.fv4Scores.B&&state.fv4Scores.B[h])||0);},0);
    var myRaw=myTeam==="A"?rawA:rawB;
    var oppRaw=myTeam==="A"?rawB:rawA;
    var hasFv4=myRaw>0||oppRaw>0;
    if(hasFv4){fv4Pl=myRaw<oppRaw?4:oppRaw<myRaw?2:3;}
  }
  // Find which foursome for bogey-free
  var myFoursome=null;
  if(myTeam){
    var fA=dt.A.slice(0,2),fB=dt.A.slice(2,4),fC=dt.B.slice(0,2),fD=dt.B.slice(2,4);
    if(fA.indexOf(player)!==-1&&state.fv4BogeyFreeA)myFoursome="bogey-free";

  var sr=_ur(DEFAULT);
  var s1=_us(DEFAULT);var state=s1[0];var setLocal=s1[1];
  var s2=_us("connecting");var status=s2[0];var setStatus=s2[1];
  var s3=_us(null);var saved=s3[0];var setSaved=s3[1];
  var pending=_ur(null);var mounted=_ur(true);

  _ue(function(){mounted.current=true;return function(){mounted.current=false;};});

  // Initial load
  _ue(function(){
    fetch(FB_URL).then(function(r){return r.json();}).then(function(val){
      if(!mounted.current)return;
      if(val&&typeof val==="object"){
        var m=Object.assign({},DEFAULT,val);
        setLocal(m);sr.current=m;
      } else {
        fetch(FB_URL,{method:"PUT",body:JSON.stringify(DEFAULT)});
      }
      setStatus("live");
    }).catch(function(){if(mounted.current)setStatus("offline");});
  },[]);

  // Poll every 4 seconds for updates from other users
  _ue(function(){
    var iv=setInterval(function(){
      if(!mounted.current||pending.current)return;
      fetch(FB_URL).then(function(r){return r.json();}).then(function(val){
        if(!mounted.current)return;
        if(val&&typeof val==="object"){
          var m=Object.assign({},DEFAULT,val);
          var a=JSON.stringify(sr.current);
          var b=JSON.stringify(m);
          if(a!==b){sr.current=m;setLocal(m);}
          setStatus("live");
        }
      }).catch(function(){if(mounted.current)setStatus("offline");});
    },POLL_MS);
    return function(){clearInterval(iv);};
  },[]);

  var setState=_uc(function(upd){
    setLocal(function(prev){
      var next=typeof upd==="function"?upd(prev):upd;
      sr.current=next;
      if(pending.current)clearTimeout(pending.current);
      pending.current=setTimeout(function(){
        pending.current=null;
        fetch(FB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(next)})
          .then(function(){if(mounted.current){setStatus("live");setSaved(new Date());} })
          .catch(function(){if(mounted.current)setStatus("offline");});
      },800);

// ── Scramble ──────────────────────────────────────────────────────────────────
function ScrambleCard(props){
  var state=props.state,setState=props.setState;
  var pars=THORNAPPLE_PARS;
  var TK=["A","B","C","D"];
  var TC=[C.gold,C.birdie,C.red,"#a78bfa"];

  function swapFront(src,dst){setState(function(prev){var newP=prev.scFrontPairs.map(function(p){return p.slice();});var si=parseInt(src.split("_")[0]),sj=parseInt(src.split("_")[1]),di=parseInt(dst.split("_")[0]),dj=parseInt(dst.split("_")[1]);var tmp=newP[si][sj];newP[si][sj]=newP[di][dj];newP[di][dj]=tmp;return Object.assign({},prev,{scFrontPairs:newP});});}
  function swapBack(src,dst){setState(function(prev){var newP=prev.scBackPairs.map(function(p){return p.slice();});var si=parseInt(src.split("_")[0]),sj=parseInt(src.split("_")[1]),di=parseInt(dst.split("_")[0]),dj=parseInt(dst.split("_")[1]);var tmp=newP[si][sj];newP[si][sj]=newP[di][dj];newP[di][dj]=tmp;return Object.assign({},prev,{scBackPairs:newP});});}
  function setScFront(t,h2,v){setState(function(prev){var ns=Object.assign({},prev.scFrontScores);ns[t]=Object.assign({},ns[t]);ns[t][h2]=v;return Object.assign({},prev,{scFrontScores:ns});});}
  function setScBack(t,h2,v){setState(function(prev){var ns=Object.assign({},prev.scBackScores);ns[t]=Object.assign({},ns[t]);ns[t][h2]=v;return Object.assign({},prev,{scBackScores:ns});});}
  function togCTP(p,h2){setState(function(prev){return Object.assign({},prev,{scCTPList:togListItem(prev.scCTPList,p,h2)});});}
  function togLD(p,h2){setState(function(prev){return Object.assign({},prev,{scLDList:togListItem(prev.scLDList,p,h2)});});}

  function renderHalf(half,pairs,setScore,scores,holes,label,lockKey,swapFn){
    var totals=TK.map(function(t){return{id:t,score:holes.reduce(function(s,h2){var pts=holePoints(scores[t]&&scores[t][h2],pars[h2]);return s+(pts!==null&&pts!==undefined?pts:0);},0)};});
    var ranked=rankArr(totals.map(function(x){return Object.assign({},x);}));
    var locked=half==="front"?state.scFrontLocked:state.scBackLocked;
    function doLock(){setState(function(prev){var u={};u[lockKey]=true;return Object.assign({},prev,u);});}
    function doUnlock(){setState(function(prev){var u={};u[lockKey]=false;return Object.assign({},prev,u);});}

    return h("div",{style:{marginBottom:14}},
      h(PairingEditor,{title:label+" TWOSOMES",pairs:pairs,locked:locked,groupSize:2,color:TC[0],onLock:doLock,onUnlock:doUnlock,onSwap:swapFn}),
      TK.map(function(t,ti){
        var pr=pairs[ti]||[];
        var nlc=totals.find(function(x){return x.id===t;}).score;
        var rank=(ranked.find(function(r){return r.id===t;})||{rank:4}).rank;
        var pl=H_F9.concat(H_B9).some(function(h2){return scores[t]&&scores[t][h2];})?ppTeam4(rank):0;
        return h("div",{key:t,style:{background:C.surface,borderRadius:8,padding:10,marginBottom:7,border:"1px solid "+TC[ti]+"44"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:7}},
            h("span",{style:{color:TC[ti],fontWeight:700,fontSize:13}},pr.join(" & ")),
            h("div",{style:{display:"flex",gap:6,fontSize:12}},
              h("span",{style:{color:C.birdie}},nlc+" NLC"),
              h("span",{style:{color:C.gold}},"+"+pl+" PL"),
              h("span",{style:{color:C.cream,fontWeight:700}},nlc+pl)
            )
          ),
          h("div",{className:"sx"},
            h("div",{style:{display:"flex",gap:4,paddingBottom:2}},
              holes.map(function(h2){
                return h("div",{key:h2,style:{textAlign:"center",flexShrink:0}},
                  h("div",{style:{color:pars[h2]===3?C.gold:pars[h2]===5?"#60a5fa":C.dim,fontSize:9,marginBottom:2}},"H"+h2+" p"+pars[h2]),
                  h(SI,{value:(scores[t]&&scores[t][h2])||"",onChange:function(v){setScore(t,h2,v);},par:pars[h2]})
                );
              })
            )
          ),
          h(IndividualAward,{label:"CTP",list:state.scCTPList,holes:holes,pars:pars,players:pr,onToggle:togCTP,pts:CTP_PTS,type:"ctp",color:C.gold}),
          h(IndividualAward,{label:"LD",list:state.scLDList,holes:holes,pars:pars,players:pr,onToggle:togLD,pts:LD_PTS,type:"ld",color:"#60a5fa"})
        );
      }),
      h("div",{style:{background:C.bg,borderRadius:6,padding:8,border:"1px solid "+C.border}},
        h("div",{style:{color:C.dim,fontSize:10,fontWeight:600,marginBottom:5}},"STANDINGS"),
        ranked.map(function(r,i){
          var pr=(half==="front"?state.scFrontPairs:state.scBackPairs)[TK.indexOf(r.id)]||[];
          return h("div",{key:r.id,style:{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:i<3?"1px solid "+C.border:"none",fontSize:12}},
            h("span",{style:{color:i===0?C.gold:C.dim}},r.rank+" "+pr.join(" & ")),
            h("span",{style:{color:C.gold,fontWeight:700}},r.score+" NLC  +"+ppTeam4(r.rank)+" PL")
          );
        })
      )
    );
  }

  return h("div",null,
    h("div",{style:{background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:10,color:C.dim,lineHeight:1.6}},
      "SCRAMBLE: Shared twosome score - both players get same NLC pts individually | PLACE: 1st=4, 2nd=3, 3rd=2, 4th=1 per half | CTP=+"+CTP_PTS+" | LD=+"+LD_PTS+" (both go to individual)"
    ),
    renderHalf("front",state.scFrontPairs,setScFront,state.scFrontScores,H_F9,"FRONT 9 (ORIGINAL PAIRS)","scFrontLocked",swapFront),
    h("div",{style:{border:"1px dashed "+C.golddim,margin:"10px 0",padding:"8px 12px",borderRadius:6,textAlign:"center",color:C.gold,fontWeight:700,fontSize:13}},"TEE FLIP - NEW PARTNERS FOR BACK 9"),
    renderHalf("back",state.scBackPairs,setScBack,state.scBackScores,H_B9,"BACK 9 (NEW PAIRS AFTER FLIP)","scBackLocked",swapBack)
  );
}

// ── 4v4 Draft ─────────────────────────────────────────────────────────────────
function FourV4Card(props){
  var state=props.state,setState=props.setState;
  var pars=MINES_PARS;
  var dt=state.draftTeams||{A:[],B:[]};
  var teamA=dt.A||[];
  var teamB=dt.B||[];
  var locked=state.draftLocked||false;
  var drafted=teamA.concat(teamB);
  var remaining=PLAYERS.filter(function(p){return drafted.indexOf(p)===-1;});
  var pickCount=drafted.length;
  var currentPick=pickCount%2===0?"A":"B";

  // Safe leaderboard sort
  var leaderboard=PLAYERS.slice().sort(function(a,b){
    var ta=0,tb=0;
    try{ta=calcTotal(state,a);}catch(e){}
    try{tb=calcTotal(state,b);}catch(e){}
    return tb-ta;
  });

  function makePick(p){
    if(locked||drafted.indexOf(p)!==-1)return;
    setState(function(prev){
      var a=(prev.draftTeams&&prev.draftTeams.A)||[];
      var b=(prev.draftTeams&&prev.draftTeams.B)||[];
      var cnt=a.length+b.length;
      var pick=cnt%2===0?"A":"B";
      var newA=a.slice(),newB=b.slice();
      if(pick==="A")newA=newA.concat([p]);
      else newB=newB.concat([p]);
      return Object.assign({},prev,{draftTeams:{A:newA,B:newB}});
    });
  }
  function undoPick(){
    setState(function(prev){
      var a=(prev.draftTeams&&prev.draftTeams.A)||[];
      var b=(prev.draftTeams&&prev.draftTeams.B)||[];
      var newA=a.slice(),newB=b.slice();
      if(newB.length>0)newB.pop();
      else if(newA.length>0)newA.pop();
      return Object.assign({},prev,{draftTeams:{A:newA,B:newB}});
    });
  }
  function resetDraft(){setState(function(prev){return Object.assign({},prev,{draftTeams:{A:[],B:[]},draftLocked:false});});}
  function lockDraft(){setState(function(prev){return Object.assign({},prev,{draftLocked:true});});}
  function unlockDraft(){setState(function(prev){return Object.assign({},prev,{draftLocked:false});});}
  function setScore(t,h2,v){setState(function(prev){var ns=Object.assign({},prev.fv4Scores||{A:{},B:{}});ns[t]=Object.assign({},ns[t]||{});ns[t][h2]=v;return Object.assign({},prev,{fv4Scores:ns});});}
  function togCTP(p,h2){setState(function(prev){return Object.assign({},prev,{fv4CTPList:togListItem(prev.fv4CTPList,p,h2)});});}
  function togLD(p,h2){setState(function(prev){return Object.assign({},prev,{fv4LDList:togListItem(prev.fv4LDList,p,h2)});});}
  function togBF(t){setState(function(prev){if(t==="A")return Object.assign({},prev,{fv4BogeyFreeA:!prev.fv4BogeyFreeA});return Object.assign({},prev,{fv4BogeyFreeB:!prev.fv4BogeyFreeB});});}

  var fv4sc=state.fv4Scores||{A:{},B:{}};
  var rawA=H18.reduce(function(s,h2){return s+(parseInt(fv4sc.A&&fv4sc.A[h2])||0);},0);
  var rawB=H18.reduce(function(s,h2){return s+(parseInt(fv4sc.B&&fv4sc.B[h2])||0);},0);
  var hasScores=rawA>0||rawB>0;
  var aWins=hasScores&&rawA>0&&rawB>0&&rawA<rawB;
  var bWins=hasScores&&rawA>0&&rawB>0&&rawB<rawA;

  return h("div",null,
    // Info bar
    h("div",{style:{background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:10,color:C.dim,lineHeight:1.6}},
      "4V4: DRAFT FORMAT | 1st=4pts, 2nd=2pts per player | Bogey-free bonus: +3pts | CTP=+"+CTP_PTS+" | LD=+"+LD_PTS
    ),
    // Draft picker
    !locked&&h("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:10,marginBottom:10}},
      h("div",{style:{color:C.gold,fontWeight:700,fontSize:13,marginBottom:6}},"DRAFT - TAP TO PICK"),
      h("div",{style:{color:C.dim,fontSize:10,marginBottom:8}},
        remaining.length>0
          ? "TEAM "+currentPick+" PICKS NEXT ("+remaining.length+" remaining)"
          : "Draft complete. Lock in teams below."
      ),
      // Available players
      remaining.length>0&&h("div",{style:{marginBottom:10}},
        h("div",{style:{color:C.muted,fontSize:9,fontWeight:600,letterSpacing:1,marginBottom:5}},"AVAILABLE (LEADERBOARD ORDER)"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:4}},
          leaderboard.filter(function(p){return remaining.indexOf(p)!==-1;}).map(function(p,i){
            var rank=leaderboard.indexOf(p)+1;
            var col=currentPick==="A"?C.gold:C.red;
            return h(Btn,{key:p,onClick:function(){makePick(p);},
              style:{padding:"8px 12px",border:"2px solid "+col,borderRadius:6,fontSize:13,fontWeight:700,
                background:col+"22",color:col,textAlign:"left",minHeight:42,display:"flex",alignItems:"center",gap:8}},
              h("span",{style:{color:C.dim,fontSize:11,width:20}},rank),
              p,
              h("span",{style:{color:C.dim,fontSize:10,marginLeft:"auto"}},"Team "+currentPick+" picks")
            );
          })
        )
      ),
      // Teams so far
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
        ["A","B"].map(function(t){
          var col=t==="A"?C.gold:C.red;
          var players=t==="A"?teamA:teamB;
          return h("div",{key:t,style:{background:C.bg,borderRadius:6,padding:8,border:"1px solid "+col+"55"}},
            h("div",{style:{color:col,fontWeight:700,fontSize:12,marginBottom:5}},"TEAM "+t),
            players.length===0
              ? h("div",{style:{color:C.dim,fontSize:11,fontStyle:"italic"}},"no picks yet")
              : players.map(function(p){return h("div",{key:p,style:{color:C.cream,fontSize:12,padding:"2px 0"}},p);})
          );
        })
      ),
      // Controls
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        drafted.length>0&&remaining.length>0&&h(Btn,{onClick:undoPick,style:{padding:"7px 12px",border:"1px solid "+C.border,borderRadius:5,fontSize:11,fontWeight:700,background:C.surface,color:C.dim,minHeight:38}},"UNDO"),
        drafted.length>0&&remaining.length>0&&h(Btn,{onClick:resetDraft,style:{padding:"7px 12px",border:"1px solid "+C.red,borderRadius:5,fontSize:11,fontWeight:700,background:C.bg,color:C.red,minHeight:38}},"RESET"),
        remaining.length===0&&h(Btn,{onClick:lockDraft,style:{flex:1,padding:"8px",border:"1px solid "+C.birdie,borderRadius:5,fontSize:12,fontWeight:700,background:"#0d3a1a",color:C.birdie,minHeight:42}},"LOCK IN TEAMS"),
        remaining.length===0&&h(Btn,{onClick:resetDraft,style:{padding:"8px 12px",border:"1px solid "+C.red,borderRadius:5,fontSize:11,fontWeight:700,background:C.bg,color:C.red,minHeight:42}},"RESET")
      )
    ),
    // Teams display when locked
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
      ["A","B"].map(function(t){
        var col=t==="A"?C.gold:C.red;
        var players=t==="A"?teamA:teamB;
        return h("div",{key:t,style:{background:C.surface,borderRadius:8,padding:10,border:"1px solid "+(t==="A"?C.golddim:"#6b1a1a")}},
          h("div",{style:{color:col,fontWeight:700,fontSize:12,marginBottom:5}},"TEAM "+t),
